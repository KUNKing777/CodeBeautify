<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0070f3"/>
      <stop offset="100%" stop-color="#0050a0"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cce4ff"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="512" height="512" rx="108" ry="108" fill="url(#bg)"/>

  <!-- Left bracket < -->
  <path d="M140 160 L80 256 L140 352" stroke="url(#sparkle)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Right bracket > -->
  <path d="M372 160 L432 256 L372 352" stroke="url(#sparkle)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Slash / -->
  <line x1="290" y1="140" x2="222" y2="372" stroke="url(#sparkle)" stroke-width="28" stroke-linecap="round" opacity="0.7"/>

  <!-- Sparkle star top-right -->
  <g transform="translate(380, 100)" fill="white">
    <path d="M0 -20 L4 -4 L20 0 L4 4 L0 20 L-4 4 L-20 0 L-4 -4 Z" opacity="0.95"/>
  </g>

  <!-- Small sparkle -->
  <g transform="translate(420, 140) scale(0.5)" fill="white">
    <path d="M0 -20 L4 -4 L20 0 L4 4 L0 20 L-4 4 L-20 0 L-4 -4 Z" opacity="0.6"/>
  </g>
</svg>
